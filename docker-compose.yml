services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-los_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-los_password}
      POSTGRES_DB: ${POSTGRES_DB:-los_version_portal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-los_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-los_admin}:${POSTGRES_PASSWORD:-los_password}@postgres:5432/${POSTGRES_DB:-los_version_portal}?schema=public
      API_PORT: 4000
      API_URL: ${API_URL:-http://localhost:4000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      CORS_ORIGINS: ${WEB_URL:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set a strong secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set a strong secret}
      COOKIE_SECRET: ${COOKIE_SECRET:?set a strong secret}
      CSRF_SECRET: ${CSRF_SECRET:?set a strong secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL:-admin@company.com}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD:-Admin@123}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PG_DUMP_PATH: pg_dump
    ports:
      - "4000:4000"
    volumes:
      - api_uploads:/repo/apps/api/uploads
      - api_backups:/repo/apps/api/backups

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_uploads:
  api_backups:
