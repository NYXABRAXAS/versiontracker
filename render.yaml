# Render Blueprint for the LOS Version Management Portal.
# Deploy: connect this repo in the Render dashboard -> "New +" -> "Blueprint".
# Creates: a managed PostgreSQL database, the NestJS API service, and the
# Next.js web service - all on Render's FREE tier (no payment info required).
#
# Free tier trade-offs to know about:
# - Both web services spin down after ~15 min of inactivity; the next request
#   wakes them up but takes 30-60s (cold start).
# - The free PostgreSQL database is deleted after 30 days. Upgrade its plan
#   (or take a manual backup and restore into a fresh one) before that.
# - No persistent disk on free web services - see the note near `disk:` below.
# Bump `plan: free` to `plan: starter` on any of these once you're ready for
# production-grade always-on hosting.
#
# IMPORTANT - two env vars can't be known until after the first deploy,
# because Render assigns each service's public *.onrender.com URL on
# creation: WEB_URL / CORS_ORIGINS (on the API service) and
# NEXT_PUBLIC_API_URL (on the web service, baked in at Next.js build time).
# They're marked `sync: false` below so Render prompts for them; the exact
# steps (deploy once, copy the URLs, set these three, redeploy) are in
# docs/DEPLOYMENT.md.

databases:
  - name: los-version-portal-db
    databaseName: los_version_portal
    plan: free
    postgresMajorVersion: "17"

services:
  - type: web
    name: los-version-portal-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: los-version-portal-db
          property: connectionString
      - key: API_URL
        sync: false # set to this service's Render URL, e.g. https://los-version-portal-api.onrender.com
      - key: WEB_URL
        sync: false # set to the web service's Render URL, e.g. https://los-version-portal-web.onrender.com
      - key: CORS_ORIGINS
        sync: false # same value as WEB_URL
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: SEED_SUPER_ADMIN_EMAIL
        value: admin@company.com
      - key: SEED_SUPER_ADMIN_PASSWORD
        sync: false # set a strong initial password before first deploy
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: BACKUP_CRON
        value: "0 2 * * *"
      - key: PG_DUMP_PATH
        value: pg_dump
    # File uploads and pg_dump backups are written to local disk. Render's web
    # service disk is EPHEMERAL and wiped on every deploy/restart unless you
    # attach a persistent disk (requires a paid instance type, not the free
    # tier). Uncomment once on a plan that supports disks:
    # disk:
    #   name: los-api-data
    #   mountPath: /repo/apps/api/uploads
    #   sizeGB: 5

  - type: web
    name: los-version-portal-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false # set to the API service's Render URL, e.g. https://los-version-portal-api.onrender.com - required at BUILD time, redeploy after setting
